datamodule:
  _target_: "SLAE.datasets.datamodule.PDBDataModule"
  pdb_dir: "/data/pdb_store/" #${env.paths.data}/pdb/ # Directory where raw PDB/mmtf files are stored
  processed_dir: "/data/processed/" # Directory where processed dataset files are stored
  format: "pdb" #"mmtf" # Format of the raw PDB/MMTF files
  num_workers: 4 # Number of workers for dataloader
  pin_memory: False #True # Pin memory for dataloader
  batch_size: 8 # Batch size for dataloader
  dataset_fraction: 1.0 # Fraction of the dataset to use
  overwrite: False # Whether to overwrite the dataset if it already exists
  in_memory: False # Whether to load the entire dataset into memory
  train_list: "/data/train.list" # list of files containing training file names
  val_list: "/data/val.list" # list of files containing validation file names
  crop: True
  crop_len: 512
  full_graph_eval: True
  rand_slice: True
  slice_range: [0.5,1.0]
  remove_sidechains: False


num_classes: 24 # Number of classes